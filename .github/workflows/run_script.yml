name: Run AI Agent Daily

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (Force Fresh)
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0  # Ensures the latest code is pulled

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt  # Installs all required packages
      
      - name: Create credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
      
      - name: Run the Script
        run: python main.py  # Executes your main script
